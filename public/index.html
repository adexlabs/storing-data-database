<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>AI Chatbot</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="app">

            <aside class="sidebar">

                <button id="newChat">
                    + New Chat
                </button>

                <div id="conversationList"></div>

            </aside>

            <main class="chat-area">

                <div id="messages"></div>

                <div class="input-box">

                    <input
                        id="messageInput"
                        placeholder="Message AI...">

                    <button id="sendBtn">
                        Send
                    </button>

                </div>

            </main>

        </div>

        <script src="script.js"></script>

    </body>
</html>
